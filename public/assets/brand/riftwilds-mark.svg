<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Riftwilds egg mark" class="rw-mark">
  <defs>
    <radialGradient id="rwShell" cx="42%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#3a4254"/>
      <stop offset="42%" stop-color="#1a2030"/>
      <stop offset="78%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#05070c"/>
    </radialGradient>
    <linearGradient id="rwVein" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d08a"/>
      <stop offset="45%" stop-color="#c9a15a"/>
      <stop offset="100%" stop-color="#7a5424"/>
    </linearGradient>
    <linearGradient id="rwRift" x1="50%" y1="4%" x2="50%" y2="96%">
      <stop offset="0%" stop-color="#9afbff" stop-opacity="0.25"/>
      <stop offset="22%" stop-color="#3de7ff"/>
      <stop offset="48%" stop-color="#b8fbff"/>
      <stop offset="72%" stop-color="#2ad4f0"/>
      <stop offset="100%" stop-color="#1288a8" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="rwCore" cx="48%" cy="46%" r="56%">
      <stop offset="0%" stop-color="#fff6d0"/>
      <stop offset="28%" stop-color="#ffd078"/>
      <stop offset="62%" stop-color="#ff9a2e"/>
      <stop offset="100%" stop-color="#b04a10"/>
    </radialGradient>
    <radialGradient id="rwCoreBloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc45a" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ff8a20" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ff6a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="rwBloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rwSoft" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <filter id="rwRiftGlow" x="-60%" y="-20%" width="220%" height="140%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rwEggClip">
      <ellipse cx="256" cy="258" rx="148" ry="198"/>
    </clipPath>
  </defs>

  <!-- Outer cyan rim for dark-header contrast -->
  <ellipse class="rw-mark__rim" cx="256" cy="258" rx="152" ry="202" fill="none" stroke="#3de7ff" stroke-opacity="0.38" stroke-width="3" filter="url(#rwSoft)"/>

  <ellipse class="rw-mark__shell" cx="256" cy="258" rx="148" ry="198" fill="url(#rwShell)" stroke="#141820" stroke-width="3"/>

  <g clip-path="url(#rwEggClip)">
    <!-- Stone micro-grain suggestion -->
    <ellipse cx="220" cy="200" rx="90" ry="120" fill="#2a3344" opacity="0.22"/>
    <ellipse cx="300" cy="310" rx="70" ry="90" fill="#05070c" opacity="0.35"/>

    <!-- Copper vein / circuit filigree -->
    <g class="rw-mark__veins" stroke="url(#rwVein)" stroke-width="1.7" fill="none" stroke-linecap="round" opacity="0.95">
      <path d="M188 136 C208 168 214 210 204 252 C194 294 198 334 218 366"/>
      <path d="M324 134 C304 170 300 212 310 254 C320 296 314 336 294 368"/>
      <path d="M172 218 H208 M304 218 H340"/>
      <path d="M182 278 H214 M298 278 H330"/>
      <path d="M208 168 L230 184 L230 206"/>
      <path d="M304 168 L282 184 L282 206"/>
      <path d="M218 322 L240 338 M294 322 L272 338"/>
      <path d="M200 200 L214 214 M204 300 L218 314"/>
      <path d="M312 200 L298 214 M308 300 L294 314"/>
      <circle cx="208" cy="252" r="2.6" fill="#e8c878" stroke="none"/>
      <circle cx="304" cy="252" r="2.6" fill="#e8c878" stroke="none"/>
      <circle cx="230" cy="184" r="2.1" fill="#d4b060" stroke="none"/>
      <circle cx="282" cy="184" r="2.1" fill="#d4b060" stroke="none"/>
    </g>

    <!-- Amber crystal bloom (behind rift) -->
    <ellipse class="rw-mark__core-bloom" cx="256" cy="256" rx="78" ry="70" fill="url(#rwCoreBloom)" filter="url(#rwBloom)"/>

    <!-- Cyan rift energy — jagged lightning channel -->
    <g class="rw-mark__rift" filter="url(#rwRiftGlow)">
      <path d="M256 74
               C248 110 238 148 232 186
               C226 224 224 250 230 278
               C236 308 242 340 248 372
               C252 398 255 422 256 446
               C257 422 260 398 264 372
               C270 340 276 308 282 278
               C288 250 286 224 280 186
               C274 148 264 110 256 74 Z"
            fill="url(#rwRift)" opacity="0.92"/>
      <!-- Lightning forks -->
      <path d="M248 130 L236 158 L250 170 L238 198" fill="none" stroke="#b8fbff" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
      <path d="M264 150 L278 176 L262 188 L274 220" fill="none" stroke="#7ef7ff" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
      <path d="M244 300 L230 328 L246 342 L234 370" fill="none" stroke="#9af6ff" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
      <path d="M268 310 L282 336 L266 350" fill="none" stroke="#5eefff" stroke-width="1.4" stroke-linecap="round" opacity="0.65"/>
      <!-- Hot core bolt -->
      <path d="M256 92 C250 140 244 190 242 236 C240 282 246 330 252 378 C254 400 255 418 256 434
               C257 418 258 400 260 378 C266 330 272 282 270 236 C268 190 262 140 256 92 Z"
            fill="#e8ffff" opacity="0.62"/>
      <!-- Specks -->
      <circle cx="240" cy="160" r="1.6" fill="#dffffa" opacity="0.9"/>
      <circle cx="272" cy="200" r="1.3" fill="#b8fbff" opacity="0.8"/>
      <circle cx="246" cy="340" r="1.4" fill="#dffffa" opacity="0.85"/>
      <circle cx="270" cy="360" r="1.1" fill="#9af6ff" opacity="0.75"/>
    </g>

    <!-- Faceted amber crystal -->
    <g class="rw-mark__core" filter="url(#rwBloom)">
      <polygon points="256,200 286,256 256,312 226,256" fill="url(#rwCore)"/>
      <polygon points="256,200 286,256 256,256" fill="#ffd890" opacity="0.35"/>
      <polygon points="256,256 286,256 256,312" fill="#c45a12" opacity="0.28"/>
      <polygon points="256,214 272,256 256,298 240,256" fill="#fff4c8" opacity="0.72"/>
      <polygon points="256,228 264,256 256,284 248,256" fill="#ffffff" opacity="0.55"/>
    </g>
  </g>

  <!-- Pole caps -->
  <polygon class="rw-mark__cap" points="256,58 272,78 256,98 240,78" fill="#12161f" stroke="#e0b86a" stroke-width="1.6"/>
  <polygon class="rw-mark__cap" points="256,426 272,446 256,466 240,446" fill="#12161f" stroke="#e0b86a" stroke-width="1.6"/>
</svg>
