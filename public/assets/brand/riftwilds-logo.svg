    <g stroke="url(#rwLVein)" stroke-width="1.3" fill="none" opacity="0.95">
      <path d="M62 50 C75 70 78 95 72 120 C66 145 70 165 82 180"/>
      <path d="M138 50 C125 70 122 95 128 120 C134 145 130 165 118 180"/>
      <circle cx="72" cy="110" r="2" fill="#e8c878" stroke="none"/>
      <circle cx="128" cy="110" r="2" fill="#e8c878" stroke="none"/>
    </g>
    <path d="M100 16 C94 42 86 68 84 94 C82 120 84 148 88 172 C92 192 97 204 100 210
