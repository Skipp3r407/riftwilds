      <stop offset="30%" stop-color="#b8cce0"/>
      <stop offset="65%" stop-color="#6a829c"/>
      <stop offset="100%" stop-color="#d4e2f0"/>
    </linearGradient>
    <filter id="rwLBloom" x="-45%" y="-45%" width="190%" height="190%">
