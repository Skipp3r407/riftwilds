    <polygon points="100,18 110,30 100,42 90,30" fill="#12161f" stroke="#e0b86a" stroke-width="1.2"/>
    <polygon points="100,188 110,200 100,212 90,200" fill="#12161f" stroke="#e0b86a" stroke-width="1.2"/>
  </g>

  <g transform="translate(210,40)">
    <text x="310" y="72" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
          font-size="64" font-weight="700" letter-spacing="8"
          fill="url(#rwLMetal)" stroke="#0e1620" stroke-width="1.15">RIFTWILDS</text>
    <text x="310" y="72" text-anchor="middle"
          font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
          font-size="64" font-weight="700" letter-spacing="8"
