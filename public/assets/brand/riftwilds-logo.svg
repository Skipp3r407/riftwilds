    <path d="M94 55 L86 78 L96 88 L88 112" fill="none" stroke="#b8fbff" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    <path d="M106 60 L114 82 L104 92 L112 118" fill="none" stroke="#7ef7ff" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
    <g filter="url(#rwLBloom)">
