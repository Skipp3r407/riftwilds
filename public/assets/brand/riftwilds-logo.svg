<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="Riftwilds logo" class="rw-logo">
  <defs>
    <radialGradient id="rwLShell" cx="42%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#3a4254"/>
      <stop offset="45%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#05070c"/>
    </radialGradient>
    <linearGradient id="rwLVein" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d08a"/>
      <stop offset="100%" stop-color="#7a5424"/>
    </linearGradient>
    <linearGradient id="rwLRift" x1="50%" y1="4%" x2="50%" y2="96%">
      <stop offset="0%" stop-color="#9afbff" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#3de7ff"/>
      <stop offset="100%" stop-color="#1288a8" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="rwLCore" cx="48%" cy="46%" r="56%">
      <stop offset="0%" stop-color="#fff6d0"/>
      <stop offset="40%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#b04a10"/>
    </radialGradient>
    <linearGradient id="rwLMetal" x1="0%" y1="0%" x2="0%" y2="100%">
