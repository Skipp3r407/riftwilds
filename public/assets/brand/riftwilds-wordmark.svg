<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-label="Riftwilds" class="rw-wordmark">
  <defs>
    <linearGradient id="rwMetal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f2f7fc"/>
      <stop offset="22%" stop-color="#b8cce0"/>
      <stop offset="48%" stop-color="#6a829c"/>
      <stop offset="72%" stop-color="#d4e2f0"/>
      <stop offset="100%" stop-color="#8aa0b8"/>
    </linearGradient>
    <linearGradient id="rwMetalEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5eefff"/>
      <stop offset="50%" stop-color="#e8ffff"/>
      <stop offset="100%" stop-color="#5eefff"/>
    </linearGradient>
    <linearGradient id="rwInnerGlow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1a8aaa" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#3de7ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rwGem" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff1c0"/>
      <stop offset="40%" stop-color="#ffb84d"/>
      <stop offset="100%" stop-color="#c46a18"/>
    </radialGradient>
    <filter id="rwTextBloom" x="-12%" y="-40%" width="124%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rwSparkBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Soft under-glow for dark headers -->
  <text x="360" y="92" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="72" font-weight="700" letter-spacing="10"
        fill="#3de7ff" opacity="0.18" filter="url(#rwTextBloom)">RIFTWILDS</text>

  <text class="rw-wordmark__text" x="360" y="92" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="72" font-weight="700" letter-spacing="10"
        fill="url(#rwMetal)" stroke="#0e1620" stroke-width="1.35"
        filter="url(#rwTextBloom)">RIFTWILDS</text>

  <!-- Cyan edge highlight -->
  <text x="360" y="92" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="72" font-weight="700" letter-spacing="10"
        fill="none" stroke="url(#rwMetalEdge)" stroke-width="1.05" opacity="0.62">RIFTWILDS</text>

  <!-- Inner rift wash -->
  <text x="360" y="92" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', 'Palatino Linotype', serif"
        font-size="72" font-weight="700" letter-spacing="10"
        fill="url(#rwInnerGlow)" opacity="0.55">RIFTWILDS</text>

  <!-- Amber spark on the I (2nd glyph) -->
  <g class="rw-wordmark__i-spark" filter="url(#rwSparkBloom)" transform="translate(148, 48)">
    <circle cx="0" cy="0" r="7" fill="#ffb84d" opacity="0.35"/>
    <polygon points="0,-6 4.5,0 0,6 -4.5,0" fill="url(#rwGem)"/>
    <polygon points="0,-3 2,0 0,3 -2,0" fill="#fff6d8" opacity="0.9"/>
  </g>

  <!-- Underline + center gem -->
  <line x1="72" y1="118" x2="328" y2="118" stroke="#3de7ff" stroke-width="1.7" stroke-linecap="round" opacity="0.9"/>
  <line x1="392" y1="118" x2="648" y2="118" stroke="#3de7ff" stroke-width="1.7" stroke-linecap="round" opacity="0.9"/>
  <polygon class="rw-wordmark__gem" points="360,102 374,118 360,134 346,118" fill="url(#rwGem)" filter="url(#rwSparkBloom)"/>
  <polygon points="360,110 367,118 360,126 353,118" fill="#fff1c8" opacity="0.85"/>
</svg>
