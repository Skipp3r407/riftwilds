<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky-elderwood-forest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3020"/><stop offset="45%" stop-color="#3d6b4a"/><stop offset="100%" stop-color="#c4d878"/>
    </linearGradient>
    <linearGradient id="mid-elderwood-forest" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d5a38" stop-opacity="0.25"/><stop offset="100%" stop-color="#ffb84d" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-elderwood-forest" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff6d5" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffb84d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#070b16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground-elderwood-forest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4028"/><stop offset="100%" stop-color="#142018"/>
    </linearGradient>
    <filter id="soft-elderwood-forest" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky-elderwood-forest)"/>
  <rect width="100%" height="100%" fill="url(#glow-elderwood-forest)"/>
  
      <ellipse cx="280" cy="500" rx="140" ry="280" fill="#1a3a28" opacity="0.8"/>
      <ellipse cx="500" cy="480" rx="120" ry="260" fill="#244830" opacity="0.75"/>
      <ellipse cx="1400" cy="460" rx="150" ry="300" fill="#1a3a28" opacity="0.8"/>
      <ellipse cx="1650" cy="500" rx="130" ry="270" fill="#244830" opacity="0.75"/>
      <rect x="250" y="600" width="30" height="280" fill="#3d2814" opacity="0.7"/>
      <rect x="470" y="580" width="28" height="300" fill="#4a3018" opacity="0.7"/>
      <rect x="1370" y="560" width="32" height="320" fill="#3d2814" opacity="0.7"/>
      <rect x="1620" y="600" width="28" height="280" fill="#4a3018" opacity="0.7"/>
      <path d="M700 900 Q960 820 1220 900" fill="none" stroke="#c4a882" stroke-width="50" opacity="0.25"/>
      <circle cx="900" cy="300" r="40" fill="#fff2a8" opacity="0.35" filter="url(#soft-elderwood-forest)"/>
    
  <rect y="620" width="100%" height="460" fill="url(#ground-elderwood-forest)"/>
  <rect y="0" width="100%" height="100%" fill="url(#mid-elderwood-forest)" opacity="0.22"/>
  <!-- brand whisper -->
  <text x="60" y="1020" font-family="Georgia, serif" font-size="28" fill="#e8d5b0" opacity="0.55">Elderwood Forest</text>
  <text x="60" y="1050" font-family="Georgia, serif" font-size="16" fill="#c4a882" opacity="0.4">Riftwilds</text>
</svg>