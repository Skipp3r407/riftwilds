<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky-stormspire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1020"/><stop offset="40%" stop-color="#1a2848"/><stop offset="100%" stop-color="#4a6080"/>
    </linearGradient>
    <linearGradient id="mid-stormspire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3de7ff" stop-opacity="0.2"/><stop offset="100%" stop-color="#7b5cff" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="glow-stormspire" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff6d5" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffb84d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#070b16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground-stormspire" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3040"/><stop offset="100%" stop-color="#101418"/>
    </linearGradient>
    <filter id="soft-stormspire" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky-stormspire)"/>
  <rect width="100%" height="100%" fill="url(#glow-stormspire)"/>
  
      <path d="M200 900 L500 300 L800 900 Z" fill="#3a4860" opacity="0.85"/>
      <path d="M700 900 L1100 200 L1500 900 Z" fill="#2a3850" opacity="0.9"/>
      <path d="M1200 900 L1550 400 L1900 900 Z" fill="#3a4860" opacity="0.8"/>
      <path d="M1050 280 L1120 200 L1180 300" fill="none" stroke="#3de7ff" stroke-width="4" opacity="0.7"/>
      <path d="M400 400 L460 320 L500 420" fill="none" stroke="#a8e6ff" stroke-width="3" opacity="0.5"/>
      <circle cx="300" cy="180" r="2" fill="#fff" opacity="0.6"/>
      <circle cx="1600" cy="150" r="2" fill="#fff" opacity="0.5"/>
      <ellipse cx="1100" cy="250" rx="40" ry="20" fill="#e8e8f0" opacity="0.4"/>
    
  <rect y="620" width="100%" height="460" fill="url(#ground-stormspire)"/>
  <rect y="0" width="100%" height="100%" fill="url(#mid-stormspire)" opacity="0.22"/>
  <!-- brand whisper -->
  <text x="60" y="1020" font-family="Georgia, serif" font-size="28" fill="#e8d5b0" opacity="0.55">Stormspire Peaks</text>
  <text x="60" y="1050" font-family="Georgia, serif" font-size="16" fill="#c4a882" opacity="0.4">Riftwilds</text>
