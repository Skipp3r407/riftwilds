<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky-rift-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050018"/><stop offset="40%" stop-color="#1a0a40"/><stop offset="100%" stop-color="#0a2040"/>
    </linearGradient>
    <linearGradient id="mid-rift-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b5cff" stop-opacity="0.35"/><stop offset="50%" stop-color="#3de7ff" stop-opacity="0.25"/><stop offset="100%" stop-color="#ff6b9d" stop-opacity="0.2"/>
    </linearGradient>
    <radialGradient id="glow-rift-sky" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff6d5" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#ffb84d" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#070b16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground-rift-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#120820"/><stop offset="100%" stop-color="#050010"/>
    </linearGradient>
    <filter id="soft-rift-sky" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky-rift-sky)"/>
  <rect width="100%" height="100%" fill="url(#glow-rift-sky)"/>
  
      <path d="M600 0 Q900 400 700 1080" fill="none" stroke="#7b5cff" stroke-width="60" opacity="0.25" filter="url(#soft-rift-sky)"/>
      <path d="M1000 0 Q1100 500 1300 1080" fill="none" stroke="#3de7ff" stroke-width="40" opacity="0.3" filter="url(#soft-rift-sky)"/>
      <path d="M400 200 Q960 300 1500 180" fill="none" stroke="#ff6b9d" stroke-width="30" opacity="0.2" filter="url(#soft-rift-sky)"/>
      <circle cx="300" cy="180" r="2" fill="#fff" opacity="0.9"/>
      <circle cx="500" cy="120" r="1.5" fill="#fff" opacity="0.8"/>
      <circle cx="800" cy="90" r="2.5" fill="#fff" opacity="0.9"/>
      <circle cx="1200" cy="140" r="2" fill="#fff" opacity="0.85"/>
      <circle cx="1600" cy="100" r="1.5" fill="#fff" opacity="0.8"/>
      <circle cx="1700" cy="220" r="2" fill="#3de7ff" opacity="0.9"/>
      <ellipse cx="960" cy="900" rx="600" ry="80" fill="#1a1040" opacity="0.5"/>
    
  <rect y="620" width="100%" height="460" fill="url(#ground-rift-sky)"/>
  <rect y="0" width="100%" height="100%" fill="url(#mid-rift-sky)" opacity="0.22"/>
  <!-- brand whisper -->
  <text x="60" y="1020" font-family="Georgia, serif" font-size="28" fill="#e8d5b0" opacity="0.55">Rift Sky</text>
  <text x="60" y="1050" font-family="Georgia, serif" font-size="16" fill="#c4a882" opacity="0.4">Riftwilds</text>
</svg>