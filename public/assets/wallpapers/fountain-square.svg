<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="sky-fountain-square" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a4060"/><stop offset="50%" stop-color="#6a9cbc"/><stop offset="100%" stop-color="#f5d0a0"/>
    </linearGradient>
    <linearGradient id="mid-fountain-square" x1="0%" y1="0%" x2="100%" y2="100%">
