name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run test
      - run: npm run typecheck
      - run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/project_hatch
          DIRECT_URL: postgresql://user:pass@localhost:5432/project_hatch
          SESSION_SECRET: ci-session-secret-at-least-32-characters-long
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NODE_ENV: production
